name: push-server  # 工作流名称，将显示在 GitHub Actions UI 中

on:
  # 定时触发：每月1日的 00:00 UTC 自动运行一次（可用于自动构建/发布）
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

env:
  # Docker Hub 镜像仓库名（你的账号/镜像名称）
  DOCKERHUB_REPO: xct258/push-server

jobs:
  build:
    runs-on: ubuntu-latest  # 指定在 GitHub 提供的 Ubuntu 最新 runner 上执行

    permissions:
      contents: read         # 读取代码仓库内容的权限
      packages: write        # 写入 GitHub Packages（如发布镜像）权限
      id-token: write        # 用于身份验证的权限（例如 Cosign 签名）

    steps:
      # Step 1: 检出代码仓库内容（必须步骤）
      - name: Checkout repository
        uses: actions/checkout@v7  # https://github.com/actions/checkout

      # Step 2: 安装 Cosign
      - name: Install cosign
        uses: sigstore/cosign-installer@v4.1.2  # https://github.com/sigstore/cosign-installer

      # Step 3: 配置 Docker Buildx，支持多平台构建
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4  # https://github.com/docker/setup-buildx-action

      # Step 4: 登录 Docker Hub（使用 GitHub Secrets 中的账号和密码）
      - name: Docker Login
        uses: docker/login-action@v4  # https://github.com/docker/login-action
        with:
          username: ${{ secrets.DOCKERACC }}
          password: ${{ secrets.DOCKERPWD }}

      # Step 5: 构建并推送 Docker 镜像
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v7  # https://github.com/docker/build-push-action
        with:
          context: .                                # 当前目录作为构建上下文
          push: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          platforms: linux/amd64,linux/arm64        # 同时构建 x86 和 ARM 版本
          tags: ${{ env.DOCKERHUB_REPO }}:latest
